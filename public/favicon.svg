<!--
  The Presbyterian Academy favicon. A Geneva Green (#33503F) rounded square
  with a warm cream (#F1EAD9) "PA" monogram in a serif stack.

  Theme behavior:
    - Light mode: green square on a light tab background.
    - Dark mode: square lifts slightly so it reads against dark tab strips.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .disc { fill: #33503F; }
    .mark { fill: #F1EAD9; }
    @media (prefers-color-scheme: dark) {
      .disc { fill: #44694F; }
      .mark { fill: #F5EEDF; }
    }
  </style>

  <!-- Geneva Green rounded square — the brand mark. -->
  <rect class="disc" x="2" y="2" width="60" height="60" rx="14" />

  <!--
    "PA" monogram. Serif stack gives a refined feel without embedding a webfont.
    text-anchor + dominant-baseline keep the letterforms optically centered.
  -->
  <text
    class="mark"
    x="32"
    y="33"
    font-family="Fraunces, Georgia, Cambria, 'Times New Roman', serif"
    font-size="30"
    font-weight="600"
    text-anchor="middle"
    dominant-baseline="central"
  >PA</text>
</svg>
