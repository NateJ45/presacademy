<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none" role="img" aria-label="Studio Starter">
  <!-- Slate disc mark (lighter on dark backgrounds) -->
  <circle cx="30" cy="30" r="26" fill="#6B7A8D"/>
  <text
    x="30"
    y="30"
    font-family="Libre Baskerville, Georgia, Cambria, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#FBFBFA"
    text-anchor="middle"
    dominant-baseline="central"
  >S</text>
  <!-- Wordmark — light text for dark backgrounds -->
  <text
    x="68"
    y="22"
    font-family="Libre Baskerville, Georgia, Cambria, 'Times New Roman', serif"
    font-size="17"
    font-weight="700"
    fill="#FBFBFA"
    dominant-baseline="auto"
    letter-spacing="0.5"
  >Studio Starter</text>
  <text
    x="69"
    y="42"
    font-family="'Inter', system-ui, sans-serif"
    font-size="9.5"
    font-weight="400"
    fill="#8E9DAD"
    dominant-baseline="auto"
    letter-spacing="2.5"
  >YOUR STUDIO</text>
</svg>
