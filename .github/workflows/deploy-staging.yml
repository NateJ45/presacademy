name: Deploy staging preview

# Deploys the `staging` branch to a SEPARATE Cloudflare Worker (presacademy-staging)
# so you can verify on the real edge (security headers, the Sanity CDN image
# pipeline, redirects, real Lighthouse) before it reaches production. The preview
# lives at https://presacademy-staging.<your-subdomain>.workers.dev.
#
# Activates once these repo secrets exist: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# For real content in the preview, set the repo VARIABLES PUBLIC_SANITY_PROJECT_ID
# and PUBLIC_SANITY_DATASET to the same values your production deploy uses (and a
# read token if your dataset is private); otherwise it builds empty-state fallbacks.
# Setup details: docs/agent/ci-cd-and-ops.md.

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set; skipping staging deploy. See docs/agent/ci-cd-and-ops.md."
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix studio

      - name: Generate Sanity types
        run: npm run typegen

      - name: Build
        env:
          # Real content when these repo VARIABLES are set; otherwise sanityFetch
          # falls back to empty-state pages and the preview still validates the
          # edge behaviour (headers, image pipeline, routing).
          PUBLIC_SANITY_PROJECT_ID: ${{ vars.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ vars.PUBLIC_SANITY_DATASET }}
        run: npm run build

      - name: Deploy to the staging Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Reuses wrangler.jsonc (assets, entrypoint) but overrides the Worker
          # name so production (presacademy) is never touched.
          command: deploy --name presacademy-staging
