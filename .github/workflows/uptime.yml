name: Uptime check

# A lightweight safety net: hourly, confirm the live site's key pages return 200.
# A failed run notifies you through GitHub. Activates once the SITE_URL repo
# variable is set to the live origin (e.g. https://www.presbyterianacademy.org);
# until then it skips, so it never false-alarms before launch.
#
# Note: GitHub's scheduler is best-effort and can be delayed under load. For
# real monitoring, also point a dedicated service (UptimeRobot's free tier is
# plenty) at the homepage.

on:
  schedule:
    - cron: '17 * * * *' # hourly, offset off the top of the hour
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check key pages return 200
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::warning::SITE_URL variable not set; skipping uptime check."
            exit 0
          fi
          base="${SITE_URL%/}"
          fail=0
          for path in "/" "/courses" "/contact" "/accessibility"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "${base}${path}")
            echo "${code}  ${base}${path}"
            if [ "$code" != "200" ]; then fail=1; fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more key pages did not return HTTP 200."
            exit 1
          fi
