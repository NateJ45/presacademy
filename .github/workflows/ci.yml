name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install studio dependencies
        run: npm ci --prefix studio

      - name: Generate Sanity types
        run: npm run typegen

      - name: Fail if committed Sanity types are stale
        # `npm run build` does NOT run typegen, so src/lib/sanity.types.ts is
        # committed by hand after every schema change. If regenerating it here
        # produces a diff, the commit was stale (exactly the bug that shipped on
        # 2026-06-14). Catch it here instead of in production.
        run: |
          if ! git diff --quiet -- src/lib/sanity.types.ts; then
            echo "::error::src/lib/sanity.types.ts is out of date. Run 'npm run typegen' and commit the result."
            git --no-pager diff -- src/lib/sanity.types.ts
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build Astro
        # PUBLIC_SANITY_PROJECT_ID is intentionally left unset (the placeholder
        # path). sanityFetch() detects this and returns empty-state fallbacks for
        # every query, so the build completes with no Sanity project configured
        # and no credentials are required.
        env:
          PUBLIC_SANITY_PROJECT_ID: ""
        run: npm run build

      - name: Build Sanity Studio
        run: npm --prefix studio run build

      - name: Run tests
        run: npm test

      - name: Upload built site for Lighthouse
        uses: actions/upload-artifact@v4
        with:
          name: dist-client
          path: dist/client
          retention-days: 1

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    # Informative for now: the build/type/lint/test gates above are the hard
    # blockers. Once Lighthouse is consistently green in CI, drop this line to
    # make a score regression block the merge too.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/client

      - name: Lighthouse CI (a11y / SEO / best-practices budgets)
        # Reads ./lighthouserc.json. Serves the static build and asserts category
        # budgets on the key pages that exist in the empty-state fallback build.
        run: npx --yes @lhci/cli@0.14.x autorun
