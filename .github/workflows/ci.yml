name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install studio dependencies
        run: npm ci --prefix studio

      - name: Generate Sanity types
        run: npm run typegen

      - name: Build Astro
        # PUBLIC_SANITY_PROJECT_ID is intentionally left unset (or set to the
        # placeholder string). sanityFetch() detects this and returns empty-state
        # fallbacks for every query, so the build completes without any Sanity
        # project configured and no credentials are required.
        env:
          PUBLIC_SANITY_PROJECT_ID: ""
        run: npm run build

      - name: Build Sanity Studio
        run: npm --prefix studio run build

      - name: Run tests
        run: npm test
